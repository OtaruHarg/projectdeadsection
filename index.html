<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport">
    <title>Project DeadSection</title>
    <link rel="stylesheet" href="style.css" type="text/css">
  </head>
  <body>
    <div class="title_back"></div>
    <div class="logos">
      <img src="logo.PNG" width="100%" height="100%">
    </div>
    <div class="title">
      <span>ProjectDeadSection</span>
    </div>
    <div class="blank"></div>
    <div class="field">
      <div class="headline">
        <span>ブログ</span>
      </div>
    </div>
    <div class="field">
      <div class="card_L" onclick="blog(1)">
        <img src="blog.png" width="100%" height="100%">
        <span>小樽ブログFile:001<br>「始動！デッドセクション」</span>
      </div>
      <div class="card_R" onclick="blog(2)"></div>
    </div>
    <div class="field">
      <div class="card_L" onclick="blog(3)"></div>
      <div class="card_R" onclick="blog(4)"></div>
    </div>
    <div class="field">
      <div class="headline">
        <span>ノベル</span>
      </div>
    </div>
    <div class="field">
      <div class="card_L" onclick="novel(1)"></div>
      <div class="card_R" onclick="novel(2)"></div>
    </div>
    <div class="field">
      <div class="headline">
        <span>ゲーム</span>
      </div>
    </div>
    <div class="field">
      <div class="card_L" onclick="game(1)"></div>
      <div class="card_R" onclick="game(2)"></div>
    </div>
    <div class="field">
      <div class="headline">
        <span>その他</span>
      </div>
    </div>
    <div class="field">
      <div class="card_L" onclick="other(1)"></div>
      <div class="card_R" onclick="other(2)"></div>
    </div>
    <script src="script_index.js"></script>
  </body>
</html>
